<!DOCTYPE html>
<html>
<head>
    <title>Event Rooms</title>
</head>
<body>

<h2>Join Event Room</h2>

<input id="eventId" placeholder="Enter Event ID (e.g., chess)" />
<button onclick="joinRoom()">Join Event</button>

<ul id="messages"></ul>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io();
    const messages = document.getElementById('messages');

    function joinRoom() {
        const eventId = document.getElementById('eventId').value;
        socket.emit('subscribe_to_event', eventId);
    }

    socket.on('notification', (msg) => {
        const li = document.createElement('li');
        li.textContent = msg;
        messages.appendChild(li);
    });
</script>

</body>
</html>
